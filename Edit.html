<!doctype html><html><head><base target="_top"><?!= include('Styles'); ?><style>:root{--theme:<?= themeColor ?>}</style></head><body><div class="wrap"><div class="hero"><h1><?= appName ?> 内容変更</h1></div><div id="msg"><div class="notice">登録済みの内容を読み込んでいます。</div></div><form id="form" class="card hidden"><div class="grid">
<div><label>Xのお名前 *</label><input name="xName" required></div><div><label>Xのお名前の読み方</label><input name="xReading"></div><div class="full"><label>XのURL</label><input name="xUrl" type="url" maxlength="300" placeholder="https://x.com/ユーザー名"></div>
<div><label>YouTubeのお名前</label><input name="youtubeName"></div><div><label>YouTubeのお名前の読み方</label><input name="youtubeReading"></div>
<div><label>呼び方 <span class="label-note">(こうやって呼んで欲しい)</span></label><input name="callName"></div><div><label>推し始めた時期</label><input name="since" type="month"></div><div class="full"><label>知ったきっかけ</label><select name="source" id="source"><option value="">選択してください</option></select></div>
<div class="full"><label>よく見る配信 <span class="label-note">(複数選択可能)</span></label><div id="streams" class="checks"></div></div><div class="full"><label>配信をよく見る時間帯</label><select name="watchTime"><option value="">選択してください</option><option>早朝</option><option>朝</option><option>昼</option><option>夕方</option><option>夜</option><option>深夜</option><option>AII OK</option></select></div>
<div><label>血液型</label><select name="bloodType"><option value="">選択してください</option><option>A型</option><option>B型</option><option>O型</option><option>AB型</option><option>わからない</option></select></div><div><label>MBTI診断 <span class="label-note">(外部サイトに無料診断があるよ)</span></label><select name="mbti"><option value="">選択してください</option><option value="INTJ｜建築家｜戦略的で、計画を立てて行動する">INTJ　建築家　戦略的で、計画を立てて行動する</option><option value="INTP｜論理学者｜好奇心が強く、論理的に考える">INTP　論理学者　好奇心が強く、論理的に考える</option><option value="ENTJ｜指揮官｜決断力があり、人をまとめる">ENTJ　指揮官　決断力があり、人をまとめる</option><option value="ENTP｜討論者｜発想力があり、新しいことを好む">ENTP　討論者　発想力があり、新しいことを好む</option><option value="INFJ｜提唱者｜思いやりがあり、理想を大切にする">INFJ　提唱者　思いやりがあり、理想を大切にする</option><option value="INFP｜仲介者｜感受性が豊かで、自分の価値観を大切にする">INFP　仲介者　感受性が豊かで、自分の価値観を大切にする</option><option value="ENFJ｜主人公｜人を励まし、周囲を引っ張る">ENFJ　主人公　人を励まし、周囲を引っ張る</option><option value="ENFP｜運動家｜明るく自由で、好奇心が強い">ENFP　運動家　明るく自由で、好奇心が強い</option><option value="ISTJ｜管理者｜真面目で責任感が強い">ISTJ　管理者　真面目で責任感が強い</option><option value="ISFJ｜擁護者｜優しく献身的で、周囲を支える">ISFJ　擁護者　優しく献身的で、周囲を支える</option><option value="ESTJ｜幹部｜現実的で、物事を効率よく進める">ESTJ　幹部　現実的で、物事を効率よく進める</option><option value="ESFJ｜領事｜社交的で、人との調和を大切にする">ESFJ　領事　社交的で、人との調和を大切にする</option><option value="ISTP｜巨匠｜冷静で、問題解決が得意">ISTP　巨匠　冷静で、問題解決が得意</option><option value="ISFP｜冒険家｜穏やかで、感性や自由を大切にする">ISFP　冒険家　穏やかで、感性や自由を大切にする</option><option value="ESTP｜起業家｜行動力があり、刺激を好む">ESTP　起業家　行動力があり、刺激を好む</option><option value="ESFP｜エンターテイナー｜明るく、人を楽しませることが得意">ESFP　エンターテイナー　明るく、人を楽しませることが得意</option></select></div><div class="full"><label>好きなゲーム・アニメ</label><textarea name="gamesAnime"></textarea></div><div class="full"><label>趣味</label><textarea name="hobby"></textarea></div><div><label>誕生日</label><div class="birthday-selects"><select name="birthdayMonth"><option value="">月</option><option value="01">1月</option><option value="02">2月</option><option value="03">3月</option><option value="04">4月</option><option value="05">5月</option><option value="06">6月</option><option value="07">7月</option><option value="08">8月</option><option value="09">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option></select><select name="birthdayDay"><option value="">日</option><option value="01">1日</option><option value="02">2日</option><option value="03">3日</option><option value="04">4日</option><option value="05">5日</option><option value="06">6日</option><option value="07">7日</option><option value="08">8日</option><option value="09">9日</option><option value="10">10日</option><option value="11">11日</option><option value="12">12日</option><option value="13">13日</option><option value="14">14日</option><option value="15">15日</option><option value="16">16日</option><option value="17">17日</option><option value="18">18日</option><option value="19">19日</option><option value="20">20日</option><option value="21">21日</option><option value="22">22日</option><option value="23">23日</option><option value="24">24日</option><option value="25">25日</option><option value="26">26日</option><option value="27">27日</option><option value="28">28日</option><option value="29">29日</option><option value="30">30日</option><option value="31">31日</option></select></div></div><div><label>年齢</label><select name="age"><option selected>ひみつ♡</option><option>10代</option><option>20代</option><option>30代</option><option>40代</option><option>50代</option><option>60代</option><option>70代</option><option>80代</option><option>90代</option><option>100代</option></select></div><div><label>性別</label><select name="gender"><option selected>ひみつ♡</option><option>男性</option><option>女性</option><option>その他</option></select></div><div><label>公開範囲</label><select name="publicScope"><option>配信者のみ</option><option>配信内で紹介してもよい</option><option>ほかのリスナーにも公開してよい</option></select></div><div class="full"><label>メッセージ</label><textarea name="message"></textarea></div><div class="full"><button class="primary" type="submit">変更を保存</button><div id="saveMsg" style="margin-top:12px"></div></div></div></form></div><script>
const token='<?= editToken ?>';let data,config;google.script.run.withSuccessHandler(c=>{config=c;google.script.run.withSuccessHandler(d=>{data=d;render()}).withFailureHandler(err).getListenerForEdit(token)}).withFailureHandler(err).getPublicConfig();
function render(){const f=document.getElementById('form');document.getElementById('msg').innerHTML='';document.getElementById('source').insertAdjacentHTML('beforeend',config.sources.map(x=>`<option>${esc(x)}</option>`).join(''));document.getElementById('streams').innerHTML=config.streams.map(x=>`<label class="chip"><input type="checkbox" name="favoriteStreams" value="${esc(x)}" ${data.favoriteStreams.includes(x)?'checked':''}>${esc(x)}</label>`).join('');['xName','xReading','xUrl','youtubeName','youtubeReading','callName','since','watchTime','bloodType','mbti','gamesAnime','hobby','age','gender','message','source','publicScope'].forEach(k=>{if(f.elements[k])f.elements[k].value=data[k]||''});const bm=String(data.birthday||'').match(/^(\d{2})-(\d{2})$/);if(bm){f.elements.birthdayMonth.value=bm[1];f.elements.birthdayDay.value=bm[2]}f.classList.remove('hidden')}
document.getElementById('form').addEventListener('submit',e=>{e.preventDefault();const fd=new FormData(e.target),o=Object.fromEntries(fd.entries());o.favoriteStreams=fd.getAll('favoriteStreams');o.birthday=(o.birthdayMonth&&o.birthdayDay)?o.birthdayMonth+'-'+o.birthdayDay:'';document.getElementById('saveMsg').innerHTML='';google.script.run.withSuccessHandler(()=>document.getElementById('saveMsg').innerHTML='<div class="notice success">保存しました。</div>').withFailureHandler(err).updateListenerByToken(token,o)});function err(e){document.getElementById('msg').innerHTML=`<div class="notice error">${esc(e.message||e)}</div>`}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
</script></body></html>
