<!doctype html><html><head><base target="_top"><?!= include('Styles'); ?><style>:root{--theme:<?= themeColor ?>}</style></head><body><div class="wrap"><div class="hero"><h1><?= appName ?> 内容変更</h1></div><div id="msg"></div><form id="form" class="card hidden"><div class="grid">
<div><label>Xのお名前 *</label><input name="name" required></div><div><label>YouTubeのお名前</label><input name="youtubeName"></div><div><label>読み方</label><input name="reading"></div><div><label>呼び方</label><input name="callName"></div><div><label>推し始めた時期</label><input name="since"></div><div class="full"><label>知ったきっかけ</label><select name="source" id="source"><option value="">選択してください</option></select></div><div class="full"><label>好きな配信</label><div id="streams" class="checks"></div></div><div class="full"><label>好きなゲーム・アニメ</label><textarea name="gamesAnime"></textarea></div><div class="full"><label>趣味</label><textarea name="hobby"></textarea></div><div><label>誕生日</label><input name="birthday"></div><div><label>公開範囲</label><select name="publicScope"><option>配信者のみ</option><option>配信内で紹介してもよい</option><option>ほかのリスナーにも公開してよい</option></select></div><div class="full"><label>メッセージ</label><textarea name="message"></textarea></div><div class="full"><button class="primary" type="submit">変更を保存</button></div></div></form></div><script>
const token='<?= editToken ?>';let data,config;google.script.run.withSuccessHandler(c=>{config=c;google.script.run.withSuccessHandler(d=>{data=d;render()}).withFailureHandler(err).getListenerForEdit(token)}).withFailureHandler(err).getPublicConfig();
function render(){const f=document.getElementById('form');document.getElementById('source').insertAdjacentHTML('beforeend',config.sources.map(x=>`<option>${esc(x)}</option>`).join(''));document.getElementById('streams').innerHTML=config.streams.map(x=>`<label class="chip"><input type="checkbox" name="favoriteStreams" value="${esc(x)}" ${data.favoriteStreams.includes(x)?'checked':''}>${esc(x)}</label>`).join('');['name','youtubeName','reading','callName','since','gamesAnime','hobby','birthday','message','source','publicScope'].forEach(k=>{if(f.elements[k])f.elements[k].value=data[k]||''});f.classList.remove('hidden')}
document.getElementById('form').addEventListener('submit',e=>{e.preventDefault();const fd=new FormData(e.target),o=Object.fromEntries(fd.entries());o.favoriteStreams=fd.getAll('favoriteStreams');google.script.run.withSuccessHandler(()=>document.getElementById('msg').innerHTML='<div class="notice success">保存しました。</div>').withFailureHandler(err).updateListenerByToken(token,o)});function err(e){document.getElementById('msg').innerHTML=`<div class="notice error">${esc(e.message||e)}</div>`}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
</script></body></html>
