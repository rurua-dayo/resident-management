<!doctype html><html><head><base target="_top"><?!= include('Styles'); ?><style>:root{--theme:<?= themeColor ?>}</style></head><body><div class="wrap"><div class="hero"><h1><?= appName ?> 管理室</h1></div><div id="msg"></div>
<div id="login" class="card"><label>管理パスワード</label><div class="row"><input id="password" type="password"><button class="primary" onclick="login()">ログイン</button></div></div>
<div id="app" class="hidden"><div class="card toolbar"><div><label>検索</label><input id="query" oninput="load()"></div><div><label>並び順</label><select id="sort" onchange="load()"><option value="new">新着順</option><option value="name">名前順</option><option value="birthday">誕生日順</option></select></div><div><label>タグ</label><select id="tag" onchange="load()"><option value="">すべて</option></select></div><div><label>よく見る配信</label><select id="stream" onchange="load()"><option value="">すべて</option></select></div><button class="secondary" onclick="exportCsv()">CSV出力</button></div><div id="count" class="muted"></div><div id="cards" class="cards"></div></div>
<div id="modal" class="modal hidden"><div class="modal-box"><div id="modalBody"></div></div></div></div><script>
let session='',listeners=[],settings={};function login(){google.script.run.withSuccessHandler(r=>{session=r.token;document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');load()}).withFailureHandler(err).adminLogin(document.getElementById('password').value)}
function load(){const f={query:v('query'),sort:v('sort'),tag:v('tag'),stream:v('stream')};google.script.run.withSuccessHandler(r=>{listeners=r.listeners;settings=r.settings;fillFilters();render()}).withFailureHandler(err).adminGetListeners(session,f)}
function fillFilters(){const t=document.getElementById('tag'),s=document.getElementById('stream');if(t.options.length===1)t.insertAdjacentHTML('beforeend',settings.tags.map(x=>`<option>${esc(x)}</option>`).join(''));if(s.options.length===1)s.insertAdjacentHTML('beforeend',settings.streams.map(x=>`<option>${esc(x)}</option>`).join(''))}
function displayName(x){return x.xName||x.youtubeName||'名前未設定'}
function render(){document.getElementById('count').textContent=`${listeners.length}件`;document.getElementById('cards').innerHTML=listeners.map((x,i)=>`<div class="listener-card"><div class="row"><h3>${esc(displayName(x))}</h3>${x.adminTag?`<span class="tag">${esc(x.adminTag)}</span>`:''}</div><div class="muted">X：${esc(x.xName||'未設定')}（${esc(x.xReading||'読み方未設定')}）<br>YouTube：${esc(x.youtubeName||'未設定')}（${esc(x.youtubeReading||'読み方未設定')}）${x.callName?`<br>呼び方：${esc(x.callName)}`:''}</div><p>${esc(x.message||'')}</p><div class="small">よく見る配信：${esc(x.favoriteStreams.join('・')||'未設定')}<br>見る時間帯：${esc(x.watchTime||'未設定')}</div><div class="actions"><button class="secondary" onclick="openDetail(${i})">詳細・編集</button></div></div>`).join('')||'<div class="card">該当する住人はいません。</div>'}
function openDetail(i){const x=listeners[i];document.getElementById('modalBody').innerHTML=`<h2>${esc(displayName(x))}</h2><div class="grid"><div><label>Xのお名前</label><input id="mXName" value="${attr(x.xName)}"></div><div><label>Xのお名前の読み方</label><input id="mXReading" value="${attr(x.xReading)}"></div><div><label>YouTubeのお名前</label><input id="mYoutubeName" value="${attr(x.youtubeName)}"></div><div><label>YouTubeのお名前の読み方</label><input id="mYoutubeReading" value="${attr(x.youtubeReading)}"></div><div><label>呼び方</label><input id="mCall" value="${attr(x.callName)}"></div><div><label>管理タグ</label><select id="mTag"><option value="">なし</option>${settings.tags.map(t=>`<option ${t===x.adminTag?'selected':''}>${esc(t)}</option>`).join('')}</select></div><div class="full"><label>管理メモ</label><textarea id="mMemo">${esc(x.adminMemo)}</textarea></div><div class="full"><div class="notice"><b>推し始め：</b>${esc(x.since)}<br><b>知ったきっかけ：</b>${esc(x.source)}<br><b>よく見る配信：</b>${esc(x.favoriteStreams.join('・'))}<br><b>配信をよく見る時間帯：</b>${esc(x.watchTime)}<br><b>ゲーム・アニメ：</b>${esc(x.gamesAnime)}<br><b>趣味：</b>${esc(x.hobby)}<br><b>誕生日：</b>${esc(x.birthday)}<br><b>メッセージ：</b>${esc(x.message)}</div></div></div><div class="actions modal-actions"><button class="primary" onclick="save('${x.id}')">保存</button><button class="secondary" onclick="closeModal()">閉じる</button><button class="danger delete-right" onclick="del('${x.id}')">削除</button></div>`;document.getElementById('modal').classList.remove('hidden')}
function save(id){const p={xName:v('mXName'),xReading:v('mXReading'),youtubeName:v('mYoutubeName'),youtubeReading:v('mYoutubeReading'),callName:v('mCall'),adminTag:v('mTag'),adminMemo:v('mMemo')};google.script.run.withSuccessHandler(()=>{closeModal();load()}).withFailureHandler(err).adminUpdateListener(session,id,p)}function del(id){if(!confirm('この住人を削除しますか？'))return;google.script.run.withSuccessHandler(()=>{closeModal();load()}).withFailureHandler(err).adminDeleteListener(session,id)}function exportCsv(){google.script.run.withSuccessHandler(r=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+r.csv],{type:'text/csv'}));a.download=r.fileName;a.click();URL.revokeObjectURL(a.href)}).withFailureHandler(err).adminExportCsv(session)}
function closeModal(){document.getElementById('modal').classList.add('hidden')}function v(id){return document.getElementById(id)?.value||''}function err(e){document.getElementById('msg').innerHTML=`<div class="notice error">${esc(e.message||e)}</div>`}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function attr(s){return esc(s).replace(/`/g,'&#96;')}
</script></body></html>
