<!doctype html><html><head><base target="_top"><?!= include('Styles'); ?><style>:root{--theme:<?= themeColor ?>}</style></head><body><div class="wrap"><div class="hero"><h1>住人票　閲覧＆管理</h1></div><div id="msg"></div>
<div id="login" class="card"><label>管理パスワード</label><div class="row"><input id="password" type="password"><button class="primary" onclick="login()">ログイン</button></div></div>
<div id="app" class="hidden"><div class="card toolbar"><div><label>検索</label><input id="query" oninput="load()"></div><div><label>並び順</label><select id="sort" onchange="load()"><option value="new">新着順</option><option value="name">名前順</option><option value="birthday">誕生日順</option></select></div><div><label>タグ</label><select id="tag" onchange="load()"><option value="">すべて</option></select></div><div><label>よく見る配信</label><select id="stream" onchange="load()"><option value="">すべて</option></select></div><button class="secondary" onclick="exportPdf()">表示中をPDF出力</button><button class="secondary" onclick="exportAllPdf()">全登録を一括PDF出力</button></div><div id="count" class="muted"></div><div id="cards" class="cards"></div></div>
<div id="modal" class="modal hidden"><div class="modal-box"><div id="modalBody"></div></div></div></div><script>
let session='',listeners=[],settings={};function login(){google.script.run.withSuccessHandler(r=>{session=r.token;document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');load()}).withFailureHandler(err).adminLogin(document.getElementById('password').value)}
function load(){const f={query:v('query'),sort:v('sort'),tag:v('tag'),stream:v('stream')};google.script.run.withSuccessHandler(r=>{listeners=r.listeners;settings=r.settings;fillFilters();render()}).withFailureHandler(err).adminGetListeners(session,f)}
function fillFilters(){const t=document.getElementById('tag'),s=document.getElementById('stream');if(t.options.length===1)t.insertAdjacentHTML('beforeend',settings.tags.map(x=>`<option>${esc(x)}</option>`).join(''));if(s.options.length===1)s.insertAdjacentHTML('beforeend',settings.streams.map(x=>`<option>${esc(x)}</option>`).join(''))}
function displayName(x){return x.xName||x.youtubeName||'名前未設定'}
function render(){document.getElementById('count').textContent=`${listeners.length}件`;document.getElementById('cards').innerHTML=listeners.map((x,i)=>`<div class="listener-card"><div class="row"><h3>${esc(displayName(x))}</h3>${x.adminTag?`<span class="tag">${esc(x.adminTag)}</span>`:''}</div><div class="muted">X：${esc(x.xName||'未設定')}（${esc(x.xReading||'読み方未設定')}）${x.xUrl?`<br>X URL：${esc(x.xUrl)}`:''}<br>YouTube：${esc(x.youtubeName||'未設定')}（${esc(x.youtubeReading||'読み方未設定')}）${x.callName?`<br>呼び方：${esc(x.callName)}`:''}</div><p>${esc(x.message||'')}</p><div class="small">よく見る配信：${esc(x.favoriteStreams.join('・')||'未設定')}<br>見る時間帯：${esc(x.watchTime||'未設定')}<br>誕生日：${esc(x.birthdayDisplay||'未設定')}</div><div class="actions card-actions"><button class="secondary" onclick="openDetail(${i})">詳細・編集</button><button class="secondary print-right" onclick="printResident(${i})">個別印刷</button></div></div>`).join('')||'<div class="card">該当する住人はいません。</div>'}
function openDetail(i){const x=listeners[i];document.getElementById('modalBody').innerHTML=`<h2>${esc(displayName(x))}</h2><div class="grid"><div><label>Xのお名前</label><input id="mXName" value="${attr(x.xName)}"></div><div><label>Xのお名前の読み方</label><input id="mXReading" value="${attr(x.xReading)}"></div><div class="full"><label>XのURL</label><input id="mXUrl" type="url" value="${attr(x.xUrl)}"></div><div><label>YouTubeのお名前</label><input id="mYoutubeName" value="${attr(x.youtubeName)}"></div><div><label>YouTubeのお名前の読み方</label><input id="mYoutubeReading" value="${attr(x.youtubeReading)}"></div><div><label>呼び方</label><input id="mCall" value="${attr(x.callName)}"></div><div><label>血液型</label><select id="mBloodType"><option value="">未設定</option>${['A型','B型','O型','AB型','わからない'].map(t=>`<option ${t===x.bloodType?'selected':''}>${t}</option>`).join('')}</select></div><div class="full"><label>MBTI診断</label><input id="mMbti" value="${attr(x.mbti)}" readonly></div><div><label>管理タグ</label><select id="mTag"><option value="">なし</option>${settings.tags.map(t=>`<option ${t===x.adminTag?'selected':''}>${esc(t)}</option>`).join('')}</select></div><div class="full"><label>管理メモ</label><textarea id="mMemo">${esc(x.adminMemo)}</textarea></div><div class="full"><label>本人用編集URL</label><div class="row"><input id="mEditUrl" value="${attr(x.editUrl)}" readonly><button class="secondary" type="button" onclick="copyEditUrl()">URLをコピー</button></div><div class="muted">登録した本人へ再案内するための専用URLです。本人以外には共有しないでください。</div></div><div class="full"><div class="notice"><b>推し始め：</b>${esc(x.sinceDisplay||'未設定')}<br><b>知ったきっかけ：</b>${esc(x.source)}<br><b>よく見る配信：</b>${esc(x.favoriteStreams.join('・'))}<br><b>配信をよく見る時間帯：</b>${esc(x.watchTime)}<br><b>血液型：</b>${esc(x.bloodType||'未設定')}<br><b>MBTI診断：</b>${esc(x.mbti||'未設定')}<br><b>ゲーム・アニメ：</b>${esc(x.gamesAnime)}<br><b>趣味：</b>${esc(x.hobby)}<br><b>誕生日：</b>${esc(x.birthdayDisplay||'未設定')}<br><b>メッセージ：</b>${esc(x.message)}</div></div></div><div class="actions modal-actions"><button class="primary" onclick="save('${x.id}')">保存</button><button class="secondary" onclick="closeModal()">閉じる</button><button class="danger delete-right" onclick="del('${x.id}')">削除</button></div>`;document.getElementById('modal').classList.remove('hidden')}
function save(id){const p={xName:v('mXName'),xReading:v('mXReading'),xUrl:v('mXUrl'),youtubeName:v('mYoutubeName'),youtubeReading:v('mYoutubeReading'),callName:v('mCall'),bloodType:v('mBloodType'),mbti:v('mMbti'),adminTag:v('mTag'),adminMemo:v('mMemo')};google.script.run.withSuccessHandler(()=>{closeModal();load()}).withFailureHandler(err).adminUpdateListener(session,id,p)}function del(id){if(!confirm('この住人を削除しますか？'))return;google.script.run.withSuccessHandler(()=>{closeModal();load()}).withFailureHandler(err).adminDeleteListener(session,id)}
function exportPdf(){if(!listeners.length){err('PDFに出力する住人がいません。');return}openPrintWindow(listeners,'住人票一覧（表示中）')}
function exportAllPdf(){google.script.run.withSuccessHandler(items=>{if(!items.length){err('PDFに出力する住人がいません。');return}openPrintWindow(items,'住人票一覧（全登録）')}).withFailureHandler(err).adminGetAllListeners(session)}
function printResident(i){const x=listeners[i];if(!x)return;openPrintWindow([x],displayName(x)+' 住人票')}
function openPrintWindow(items,title){const w=window.open('','_blank');if(!w){err('印刷画面を開けませんでした。ポップアップを許可してください。');return}w.document.open();w.document.write(buildPrintHtml(items,title));w.document.close();w.focus();setTimeout(()=>w.print(),350)}
function buildPrintHtml(items,title){return `<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>${esc(title)}</title><style>@page{size:A4;margin:14mm}*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Yu Gothic","Noto Sans JP",sans-serif;color:#222;margin:0}h1{font-size:22px;margin:0 0 14px;border-bottom:2px solid #222;padding-bottom:8px}.resident{break-inside:avoid;border:1px solid #bbb;border-radius:10px;padding:14px;margin:0 0 12px}.resident h2{font-size:18px;margin:0 0 10px}.tag{float:right;font-size:12px;border:1px solid #999;border-radius:999px;padding:3px 8px}.grid{display:grid;grid-template-columns:140px 1fr;border-top:1px solid #ddd}.label,.value{padding:6px 8px;border-bottom:1px solid #ddd}.label{font-weight:700;background:#f5f5f5}.value{white-space:pre-wrap;word-break:break-word}.footer{font-size:11px;color:#666;text-align:right;margin-top:8px}@media print{button{display:none}}</style></head><body><h1>${esc(title)}</h1>${items.map(printResidentHtml).join('')}<div class="footer">出力日：${esc(new Date().toLocaleDateString('ja-JP'))}</div></body></html>`}
function printResidentHtml(x){const rows=[['Xのお名前',x.xName||'未設定'],['Xのお名前の読み方',x.xReading||'未設定'],['XのURL',x.xUrl||'未設定'],['YouTubeのお名前',x.youtubeName||'未設定'],['YouTubeのお名前の読み方',x.youtubeReading||'未設定'],['呼び方',x.callName||'未設定'],['推し始め',x.sinceDisplay||'未設定'],['知ったきっかけ',x.source||'未設定'],['よく見る配信',(x.favoriteStreams||[]).join('・')||'未設定'],['配信をよく見る時間帯',x.watchTime||'未設定'],['血液型',x.bloodType||'未設定'],['MBTI診断',x.mbti||'未設定'],['ゲーム・アニメ',x.gamesAnime||'未設定'],['趣味',x.hobby||'未設定'],['誕生日',x.birthdayDisplay||'未設定'],['メッセージ',x.message||'未設定'],['管理メモ',x.adminMemo||'未設定']];return `<section class="resident">${x.adminTag?`<span class="tag">${esc(x.adminTag)}</span>`:''}<h2>${esc(displayName(x))}</h2><div class="grid">${rows.map(r=>`<div class="label">${esc(r[0])}</div><div class="value">${esc(r[1])}</div>`).join('')}</div></section>`}

function copyEditUrl(){const input=document.getElementById('mEditUrl');if(!input||!input.value)return;navigator.clipboard.writeText(input.value).then(()=>{input.select()}).catch(()=>{input.select();document.execCommand('copy')})}function closeModal(){document.getElementById('modal').classList.add('hidden')}function v(id){return document.getElementById(id)?.value||''}function err(e){document.getElementById('msg').innerHTML=`<div class="notice error">${esc(e.message||e)}</div>`}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function attr(s){return esc(s).replace(/`/g,'&#96;')}
</script></body></html>
