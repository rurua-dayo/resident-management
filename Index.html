<!doctype html><html><head><base target="_top"><?!= include('Styles'); ?><style>:root{--theme:<?= themeColor ?>}</style></head><body><div class="wrap">
<div class="hero"><h1><?= appName ?></h1><div>物置の住人になるために、あなたのことを少し教えてね。</div></div>
<div id="msg"></div><form id="form" class="card"><div class="grid">
<div><label>Xのお名前 *</label><input name="xName" maxlength="100" required></div><div><label>Xのお名前の読み方</label><input name="xReading" maxlength="100"></div>
<div class="full"><label>XのURL</label><input name="xUrl" type="url" maxlength="300" placeholder="https://x.com/ユーザー名"></div>
<div><label>YouTubeのお名前</label><input name="youtubeName" maxlength="100"></div><div><label>YouTubeのお名前の読み方</label><input name="youtubeReading" maxlength="100"></div>
<div><label>呼んでほしい名前・呼び方 <span class="label-note">(こうやって呼んで欲しい)</span></label><input name="callName" maxlength="100"></div><div><label>推し始めた時期</label><input name="since" type="month"></div>
<div class="full"><label>知ったきっかけ</label><select name="source" id="source"><option value="">選択してください</option></select></div>
<div class="full"><label>よく見る配信 <span class="label-note">(複数選択可能)</span></label><div id="streams" class="checks"></div></div>
<div class="full"><label>配信をよく見る時間帯</label><select name="watchTime"><option value="">選択してください</option><option>早朝</option><option>朝</option><option>昼</option><option>夕方</option><option>夜</option><option>深夜</option><option>AII OK</option></select></div>
<div><label>血液型</label><select name="bloodType"><option value="">選択してください</option><option>A型</option><option>B型</option><option>O型</option><option>AB型</option><option>わからない</option></select></div><div><label>MBTI診断 <span class="label-note">(外部サイトに無料診断があるよ)</span></label><select name="mbti"><option value="">選択してください</option><option value="INTJ｜建築家｜戦略的で、計画を立てて行動する">INTJ　建築家　戦略的で、計画を立てて行動する</option><option value="INTP｜論理学者｜好奇心が強く、論理的に考える">INTP　論理学者　好奇心が強く、論理的に考える</option><option value="ENTJ｜指揮官｜決断力があり、人をまとめる">ENTJ　指揮官　決断力があり、人をまとめる</option><option value="ENTP｜討論者｜発想力があり、新しいことを好む">ENTP　討論者　発想力があり、新しいことを好む</option><option value="INFJ｜提唱者｜思いやりがあり、理想を大切にする">INFJ　提唱者　思いやりがあり、理想を大切にする</option><option value="INFP｜仲介者｜感受性が豊かで、自分の価値観を大切にする">INFP　仲介者　感受性が豊かで、自分の価値観を大切にする</option><option value="ENFJ｜主人公｜人を励まし、周囲を引っ張る">ENFJ　主人公　人を励まし、周囲を引っ張る</option><option value="ENFP｜運動家｜明るく自由で、好奇心が強い">ENFP　運動家　明るく自由で、好奇心が強い</option><option value="ISTJ｜管理者｜真面目で責任感が強い">ISTJ　管理者　真面目で責任感が強い</option><option value="ISFJ｜擁護者｜優しく献身的で、周囲を支える">ISFJ　擁護者　優しく献身的で、周囲を支える</option><option value="ESTJ｜幹部｜現実的で、物事を効率よく進める">ESTJ　幹部　現実的で、物事を効率よく進める</option><option value="ESFJ｜領事｜社交的で、人との調和を大切にする">ESFJ　領事　社交的で、人との調和を大切にする</option><option value="ISTP｜巨匠｜冷静で、問題解決が得意">ISTP　巨匠　冷静で、問題解決が得意</option><option value="ISFP｜冒険家｜穏やかで、感性や自由を大切にする">ISFP　冒険家　穏やかで、感性や自由を大切にする</option><option value="ESTP｜起業家｜行動力があり、刺激を好む">ESTP　起業家　行動力があり、刺激を好む</option><option value="ESFP｜エンターテイナー｜明るく、人を楽しませることが得意">ESFP　エンターテイナー　明るく、人を楽しませることが得意</option></select></div><div class="full"><label>好きなゲーム・アニメ</label><textarea name="gamesAnime" maxlength="500"></textarea></div><div class="full"><label>趣味</label><textarea name="hobby" maxlength="500"></textarea></div>
<div><label>誕生日</label><input name="birthday" type="date"></div><div><label>公開範囲</label><select name="publicScope"><option>配信者のみ</option><option>配信内で紹介してもよい</option><option>ほかのリスナーにも公開してよい</option></select></div>
<div class="full"><label>配信者へのメッセージ</label><textarea name="message" maxlength="1000"></textarea></div><div class="hidden"><input name="website" autocomplete="off"></div>
<div class="full"><button class="primary" id="submitBtn" type="submit">住人登録する</button></div></div></form>
<div id="done" class="card hidden"><h2>住人登録ができました！</h2><p>これから物置で会えるのを楽しみにしています。</p><div id="dup" class="notice hidden">同じ名前の登録が見つかりました。重複している可能性があります。</div><p class="muted">あなた専用の編集URLです。登録内容をあとから変更できます。なくさないように保存し、他人に見せないでください。</p><input id="editUrl" readonly><div class="actions"><button class="secondary" onclick="copyEditUrl()">編集URLをコピー</button></div></div>
</div><script>
let config={};google.script.run.withSuccessHandler(c=>{config=c;document.getElementById('source').insertAdjacentHTML('beforeend',c.sources.map(x=>`<option>${esc(x)}</option>`).join(''));document.getElementById('streams').innerHTML=c.streams.map(x=>`<label class="chip"><input type="checkbox" name="favoriteStreams" value="${esc(x)}">${esc(x)}</label>`).join('')}).withFailureHandler(showErr).getPublicConfig();
document.getElementById('form').addEventListener('submit',e=>{e.preventDefault();const b=document.getElementById('submitBtn');b.disabled=true;const f=new FormData(e.target);const obj=Object.fromEntries(f.entries());obj.favoriteStreams=f.getAll('favoriteStreams');google.script.run.withSuccessHandler(r=>{document.getElementById('form').classList.add('hidden');document.getElementById('done').classList.remove('hidden');document.getElementById('editUrl').value=r.editUrl;if(r.duplicateWarning)document.getElementById('dup').classList.remove('hidden');scrollTo(0,0)}).withFailureHandler(err=>{showErr(err);b.disabled=false}).submitListener(obj)});
function showErr(e){document.getElementById('msg').innerHTML=`<div class="notice error">${esc(e.message||e)}</div>`}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function copyEditUrl(){navigator.clipboard.writeText(document.getElementById('editUrl').value)}
</script></body></html>
